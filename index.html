<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAJUPAR · Cobrança Diária Gerentes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --orange: #E67E22;
    --orange-light: #F5A623;
    --black: #1A1A1A;
    --beige: #FDF6EC;
    --beige-dark: #F0E6D3;
    --green: #27AE60;
    --red: #C0392B;
    --gray: #6B6B6B;
    --border: #D9CFC4;
    --white: #FFFFFF;
    --text: #1A1A1A;
    --text-muted: #7A7169;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #F7F0E6;
    color: var(--text);
    min-height: 100vh;
  }

  /* TOP BAR */
  .topbar {
    background: var(--black);
    border-bottom: 3px solid var(--orange);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-brand {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.08em;
  }
  .topbar-brand span { color: var(--orange); }
  .topbar-date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--orange);
  }

  /* PROGRESS */
  .progress-wrap {
    background: var(--black);
    padding: 0 2rem 12px;
    border-bottom: 1px solid #333;
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #888;
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 2px;
    background: #333;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--orange);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* LAYOUT */
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* SCREEN */
  .screen { display: none; }
  .screen.active { display: block; }

  /* QUESTION CARD */
  .q-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-left: 4px solid var(--orange);
    border-radius: 6px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    animation: slideIn 0.25s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-secao {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--orange);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .badge {
    font-size: 9px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.08em;
  }
  .badge-alerta { background: #FDEDEC; color: #C0392B; }
  .badge-ok { background: #EAFAF1; color: #1E8449; }

  .q-pergunta {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--beige-dark);
  }

  .campo-wrap { margin-bottom: 1rem; }
  .campo-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 5px;
    display: block;
    font-family: 'IBM Plex Mono', monospace;
  }
  textarea, input[type="text"] {
    width: 100%;
    padding: 10px 12px;
    font-size: 14px;
    font-family: 'IBM Plex Sans', sans-serif;
    color: var(--text);
    background: var(--beige);
    border: 1px solid var(--border);
    border-radius: 4px;
    resize: vertical;
    min-height: 72px;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  textarea:focus, input[type="text"]:focus {
    outline: none;
    border-color: var(--orange);
    background: #FFFDF9;
  }

  /* NAVIGATION */
  .nav {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 1.5rem;
  }
  .btn {
    padding: 10px 22px;
    font-size: 14px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 500;
    border-radius: 4px;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-next { background: var(--orange); color: #fff; }
  .btn-back { background: #fff; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-skip {
    font-size: 12px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    margin-left: auto;
    padding: 0;
    font-family: 'IBM Plex Sans', sans-serif;
  }
  .btn-skip:hover { color: var(--text); }

  /* SUMMARY */
  .summary-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .summary-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--beige-dark);
    display: flex;
    gap: 12px;
  }
  .summary-item:last-child { border-bottom: none; }
  .summary-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--orange);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-width: 140px;
    padding-top: 2px;
  }
  .summary-value {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
    flex: 1;
    white-space: pre-wrap;
  }
  .summary-value.vazio { color: var(--text-muted); font-style: italic; }

  /* PRINT / PDF PAGE */
  .pdf-page {
    display: none;
    background: white;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11pt;
    color: #1A1A1A;
    padding: 30mm 20mm;
    max-width: 210mm;
    margin: 0 auto;
  }

  .pdf-header {
    background: #1A1A1A;
    color: #fff;
    padding: 12px 20px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 0;
  }
  .pdf-header-stripe {
    width: 8px;
    background: #E67E22;
    align-self: stretch;
    margin-right: 16px;
    flex-shrink: 0;
  }
  .pdf-header-title {
    font-size: 13pt;
    font-weight: 600;
    letter-spacing: 0.06em;
    flex: 1;
    text-align: center;
  }
  .pdf-date {
    font-size: 9pt;
    color: #E67E22;
    text-align: right;
    margin-bottom: 20px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .pdf-red-line {
    height: 2px;
    background: #C0392B;
    margin-bottom: 6px;
  }
  .pdf-section {
    margin-bottom: 16px;
    break-inside: avoid;
  }
  .pdf-section-header {
    background: #1A1A1A;
    display: flex;
    align-items: stretch;
    margin-bottom: 0;
  }
  .pdf-section-stripe {
    width: 6px;
    background: #E67E22;
    flex-shrink: 0;
  }
  .pdf-section-title {
    color: #E67E22;
    font-size: 9pt;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 12px;
    flex: 1;
  }
  .pdf-section-badge {
    font-size: 8pt;
    font-weight: 600;
    padding: 4px 14px;
    letter-spacing: 0.08em;
    align-self: center;
    margin-right: 6px;
    border-radius: 999px;
  }
  .pdf-badge-ok { background: #27AE60; color: #fff; }
  .pdf-badge-alerta { background: #C0392B; color: #fff; }
  .pdf-badge-falha { background: #C0392B; color: #fff; }
  .pdf-content {
    background: #FDF6EC;
    border-left: 4px solid #E67E22;
    padding: 10px 14px;
    font-size: 9.5pt;
    line-height: 1.7;
    color: #1A1A1A;
    white-space: pre-wrap;
  }
  .pdf-content.vazio { color: #999; font-style: italic; }
  .pdf-field-label {
    font-size: 8pt;
    font-weight: 600;
    color: #E67E22;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 6px;
    margin-bottom: 1px;
  }
  .pdf-divider { height: 1px; background: #D9CFC4; margin: 4px 0; }
  .pdf-footer {
    margin-top: 30px;
    border-top: 1px solid #E67E22;
    padding-top: 8px;
    display: flex;
    justify-content: space-between;
    font-size: 8pt;
    color: #999;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* GENERATE BTN */
  .btn-generate {
    width: 100%;
    padding: 14px;
    background: var(--black);
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    font-family: 'IBM Plex Sans', sans-serif;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 1rem;
    letter-spacing: 0.02em;
    transition: background 0.2s;
  }
  .btn-generate:hover { background: #333; }
  .btn-novo {
    width: 100%;
    padding: 12px;
    background: #fff;
    color: var(--text-muted);
    font-size: 14px;
    font-family: 'IBM Plex Sans', sans-serif;
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    margin-top: 8px;
  }

  /* PRINT STYLES */
  @media print {
    body > *:not(#pdf-output) { display: none !important; }
    #pdf-output { display: block !important; margin: 0; padding: 0; }
    .pdf-page { display: block !important; padding: 15mm; }
    @page { margin: 0; size: A4; }
  }

  /* WELCOME */
  .welcome {
    text-align: center;
    padding: 3rem 1rem;
    animation: slideIn 0.3s ease;
  }
  .welcome-logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: var(--orange);
    margin-bottom: 8px;
  }
  .welcome h1 {
    font-size: 26px;
    font-weight: 600;
    color: var(--black);
    margin-bottom: 8px;
    line-height: 1.2;
  }
  .welcome p {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 2rem;
    line-height: 1.6;
  }
  .welcome-date {
    display: inline-block;
    background: var(--beige-dark);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    color: var(--orange);
    margin-bottom: 2rem;
  }
  .btn-start {
    background: var(--orange);
    color: #fff;
    font-size: 16px;
    font-weight: 500;
    padding: 14px 40px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    transition: background 0.2s;
    display: block;
    margin: 0 auto;
  }
  .btn-start:hover { background: #cf6d17; }

  .counter-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--beige-dark);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 1rem;
    font-family: 'IBM Plex Mono', monospace;
  }
  .counter-dot {
    width: 6px; height: 6px;
    background: var(--orange);
    border-radius: 50%;
    display: inline-block;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar" id="topbar" style="display:none;">
  <div class="topbar-brand">GRUPO <span>CAJUPAR</span> · COBRANÇA DIÁRIA</div>
  <div class="topbar-date" id="topbar-date"></div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap" id="progress-wrap" style="display:none;">
  <div class="progress-labels">
    <span id="prog-label">Pilar 1 de 15</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

<!-- APP -->
<div class="container">

  <!-- WELCOME -->
  <div class="screen active" id="screen-welcome">
    <div class="welcome">
      <div class="welcome-logo">GRUPO CAJUPAR</div>
      <h1>Cobrança Diária<br>de Gerentes</h1>
      <p>Reporte o dia anterior e defina as ações<br>para o dia de hoje.</p>
      <div class="welcome-date" id="welcome-date"></div>
      <div class="counter-pill"><span class="counter-dot"></span>15 pilares · ~5 min</div>
      <button class="btn-start" onclick="iniciar()">Iniciar preenchimento →</button>
    </div>
  </div>

  <!-- PERGUNTAS -->
  <div class="screen" id="screen-perguntas">
    <div id="q-content"></div>
    <div class="nav" id="nav-buttons"></div>
  </div>

  <!-- RESUMO -->
  <div class="screen" id="screen-resumo">
    <div class="q-card" style="border-left-color: var(--black); margin-bottom:1rem;">
      <div class="q-secao">Revisão final</div>
      <div class="q-pergunta" style="border-bottom:none; margin-bottom:0; padding-bottom:0;">Confira as respostas antes de gerar o relatório.</div>
    </div>
    <div class="summary-card" id="resumo-lista"></div>
    <div style="display:flex; gap:10px; margin-bottom:0.5rem;">
      <button class="btn btn-back" onclick="voltarDoResumo()">← Voltar</button>
    </div>
    <button class="btn-generate" onclick="gerarPDF()">Gerar e imprimir relatório PDF →</button>
    <button class="btn-novo" onclick="novoRelatorio()">Novo relatório</button>
  </div>

</div>

<!-- PDF OUTPUT (hidden until print) -->
<div id="pdf-output">
  <div class="pdf-page" id="pdf-page"></div>
</div>

<script>
const perguntas = [
  { secao: "1. Reclamações", badge: null, pergunta: "Quantas reclamações tivemos ontem? Qual foi a mais grave?", campos: ["Qtd", "Motivo", "Resumo do ocorrido"] },
  { secao: "2. Causa Raiz", badge: "ALERTA", pergunta: "Por que isso aconteceu? Foi falha de processo, pessoa, produto ou equipamento?", campos: ["Causa", "Detalhamento"] },
  { secao: "3. Ação Imediata", badge: null, pergunta: "O que foi feito na hora para resolver com o cliente?", campos: ["Ação tomada", "Cliente foi contornado?"] },
  { secao: "4. Plano de Ação", badge: null, pergunta: "O que você fez hoje para garantir que isso não se repita? Quem é o responsável?", campos: ["Ação", "Responsável", "Prazo"] },
  { secao: "5. POP / Operação", badge: "ALERTA", pergunta: "O POP bateu? Se não, onde falhou?", campos: ["Status (OK/FALHA)", "Onde falhou", "Motivo"] },
  { secao: "6. Equipe (Faltas / Atrasos)", badge: "ALERTA", pergunta: "Teve falta não prevista ou atraso? Qual impacto e o que foi feito?", campos: ["Ocorrência", "Impacto", "Ação tomada"] },
  { secao: "7. Gestão D-1", badge: null, pergunta: "Essa falta era previsível? Houve falha de gestão?", campos: ["Status (SIM/NÃO)", "Motivo", "Ajuste feito"] },
  { secao: "8. Requisição (CPD / Operação)", badge: "ALERTA", pergunta: "A requisição foi entregue no horário? Faltou algo?", campos: ["Status (OK/ATRASO/FALHA)", "Itens faltantes", "Motivo"] },
  { secao: "9. Plano de Ação – Requisição", badge: null, pergunta: "O que foi feito para corrigir e evitar recorrência?", campos: ["Ação imediata", "Ação preventiva", "Responsável"] },
  { secao: "10. Estoque Mínimo", badge: "ALERTA", pergunta: "Cite 3 itens abaixo do estoque mínimo e por quê.", campos: ["Item 1 + motivo", "Item 2 + motivo", "Item 3 + motivo"] },
  { secao: "11. Compras", badge: "ALERTA", pergunta: "Teve item pedido que não chegou? Qual o motivo e plano de ação?", campos: ["Itens", "Motivo", "Ação com fornecedor", "Prazo normalização"] },
  { secao: "12. Checklist", badge: "ALERTA", pergunta: "Todos os checklists foram feitos corretamente?", campos: ["Status (OK/FALHA)", "Quais não foram feitos", "Motivo"] },
  { secao: "13. Manutenção", badge: "ALERTA", pergunta: "Tem algo emergencial hoje? Preventivas estão rodando?", campos: ["Emergencial (sim/não – qual?)", "Preventiva (OK/ATRASADA)", "Motivo"] },
  { secao: "14. Plano Tático", badge: "OK", pergunta: "Qual a prioridade número 1 da operação hoje?", campos: ["Prioridade", "Foco da equipe"] },
  { secao: "15. Risco do Dia", badge: "ALERTA", pergunta: "Qual é a única coisa que pode dar errado hoje?", campos: ["Risco", "Plano de contingência", "Responsável"] },
];

let atual = 0;
let respostas = perguntas.map(() => ({}));
const hoje = new Date();
const ontem = new Date(hoje);
ontem.setDate(hoje.getDate() - 1);

const today = hoje.toLocaleDateString('pt-BR');
const yesterday = ontem.toLocaleDateString('pt-BR');

document.getElementById('welcome-date').textContent = `Referente a: ${yesterday}`;
document.getElementById('topbar-date').textContent = `Ref.: ${yesterday} · Gerado em: ${today}`;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function iniciar() {
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('progress-wrap').style.display = 'block';
  showScreen('screen-perguntas');
  renderPergunta();
}

function atualizarProgress() {
  const pct = Math.round((atual / perguntas.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = `Pilar ${atual + 1} de ${perguntas.length}`;
  document.getElementById('prog-pct').textContent = pct + '%';
}

function salvarAtual() {
  perguntas[atual].campos.forEach((_, i) => {
    const el = document.getElementById('campo_' + i);
    if (el) respostas[atual][i] = el.value.trim();
  });
}

function renderPergunta() {
  atualizarProgress();
  const p = perguntas[atual];
  const badgeHTML = p.badge
    ? `<span class="badge badge-${p.badge === 'OK' ? 'ok' : 'alerta'}">${p.badge}</span>`
    : '';

  document.getElementById('q-content').innerHTML = `
    <div class="q-card">
      <div class="q-secao">${p.secao} ${badgeHTML}</div>
      <div class="q-pergunta">${p.pergunta}</div>
      ${p.campos.map((campo, i) => `
        <div class="campo-wrap">
          <label class="campo-label">${campo}</label>
          <textarea id="campo_${i}" placeholder="Sem ocorrência">${respostas[atual][i] || ''}</textarea>
        </div>
      `).join('')}
    </div>
  `;

  const nav = document.getElementById('nav-buttons');
  nav.innerHTML = `
    ${atual > 0 ? `<button class="btn btn-back" onclick="voltar()">← Voltar</button>` : ''}
    <button class="btn-skip" onclick="pular()">Pular</button>
    <button class="btn btn-next" onclick="avancar()">${atual < perguntas.length - 1 ? 'Próximo →' : 'Revisar →'}</button>
  `;
}

function avancar() {
  salvarAtual();
  if (atual < perguntas.length - 1) { atual++; renderPergunta(); }
  else { mostrarResumo(); }
}

function voltar() {
  salvarAtual();
  if (atual > 0) { atual--; renderPergunta(); }
}

function pular() {
  respostas[atual] = {};
  if (atual < perguntas.length - 1) { atual++; renderPergunta(); }
  else { mostrarResumo(); }
}

function voltarDoResumo() {
  atual = perguntas.length - 1;
  showScreen('screen-perguntas');
  renderPergunta();
}

function mostrarResumo() {
  const lista = document.getElementById('resumo-lista');
  lista.innerHTML = perguntas.map((p, idx) => {
    const vals = Object.values(respostas[idx]).filter(v => v);
    const texto = vals.join('\n') || null;
    return `
      <div class="summary-item">
        <div class="summary-label">${p.secao}</div>
        <div class="summary-value ${!texto ? 'vazio' : ''}">${texto || 'Sem ocorrência'}</div>
      </div>
    `;
  }).join('');
  showScreen('screen-resumo');
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('prog-label').textContent = 'Revisão';
  document.getElementById('prog-pct').textContent = '100%';
}

function badgePDF(badge) {
  if (!badge) return '';
  const cls = badge === 'OK' ? 'pdf-badge-ok' : badge === 'ALERTA' ? 'pdf-badge-alerta' : 'pdf-badge-falha';
  return `<span class="pdf-section-badge ${cls}">${badge}</span>`;
}

function gerarPDF() {
  const page = document.getElementById('pdf-page');
  const sections = perguntas.map((p, idx) => {
    const vals = Object.values(respostas[idx]).filter(v => v);
    const campos = p.campos.map((campo, i) => {
      const val = respostas[idx][i];
      if (!val) return '';
      return `<div class="pdf-field-label">${campo}</div><div>${escHtml(val)}</div><div class="pdf-divider"></div>`;
    }).join('');
    const conteudo = campos || '<span style="color:#999;font-style:italic;">Sem ocorrência</span>';
    const isEmpty = !vals.length;
    return `
      <div class="pdf-section">
        <div class="pdf-section-header">
          <div class="pdf-section-stripe"></div>
          <div class="pdf-section-title">${p.secao}</div>
          ${badgePDF(p.badge)}
        </div>
        <div class="pdf-content ${isEmpty ? 'vazio' : ''}">${conteudo}</div>
      </div>
    `;
  }).join('');

  page.innerHTML = `
    <div class="pdf-header">
      <div class="pdf-header-stripe"></div>
      <div class="pdf-header-title">GRUPO CAJUPAR · COBRANÇA DIÁRIA GERENTES</div>
    </div>
    <div class="pdf-red-line"></div>
    <div class="pdf-date">Referente a: ${yesterday} &nbsp;·&nbsp; Gerado em: ${today}</div>
    ${sections}
    <div class="pdf-footer">
      <span>GRUPO CAJUPAR · DOCUMENTO INTERNO · USO RESTRITO</span>
      <span>Gerado em ${today}</span>
    </div>
  `;

  setTimeout(() => window.print(), 300);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function novoRelatorio() {
  atual = 0;
  respostas = perguntas.map(() => ({}));
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  showScreen('screen-welcome');
}
</script>
</body>
